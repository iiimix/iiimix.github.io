<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0, max-scale=1.0, min-scale=1.0"> -->
    <meta name=viewport content="width=device-width initial-scale=1 minimum-scale=1 maximum-scale=1">
    <link rel="shortcut icon" href="../images/gd_ico.ico">
    <title>检验报告</title>
    <!-- <link rel="stylesheet" href="report.css">
    <link rel="stylesheet" href="reset.css"> -->
    <style>
        html, body, div, span, applet, object, iframe,
h1, h2, h3, h4, h5, h6, p, blockquote, pre,
a, abbr, acronym, address, big, cite, code,
del, dfn, em, img, ins, kbd, q, s, samp,
small, strike, strong, sub, sup, tt, var,
b, u, i, center,
dl, dt, dd, ol, ul, li,
fieldset, form, label, legend,
table, caption, tbody, tfoot, thead, tr, th, td,
article, aside, canvas, details, embed, 
figure, figcaption, footer, header, hgroup, 
menu, nav, output, ruby, section, summary,
time, mark, audio, video{
  margin: 0;
  padding: 0;
  border: 0;
  font-size: 100%;
  font: inherit;
  font-weight: normal;
  vertical-align: baseline;
}
/* HTML5 display-role reset for older browsers */
article, aside, details, figcaption, figure, 
footer, header, hgroup, menu, nav, section{
  display: block;
}
ol, ul, li{
  list-style: none;
}
blockquote, q{
  quotes: none;
}
blockquote:before, blockquote:after,
q:before, q:after{
  content: '';
  content: none;
}
table{
  border-collapse: collapse;
  border-spacing: 0;
}
 
/* custom */
a{
  color: #7e8c8d;
  text-decoration: none;
  -webkit-backface-visibility: hidden;
}
::-webkit-scrollbar{
  width: 5px;
  height: 5px;
}
::-webkit-scrollbar-track-piece{
  background-color: rgba(0, 0, 0, 0.2);
  -webkit-border-radius: 6px;
}
::-webkit-scrollbar-thumb:vertical{
  height: 5px;
  background-color: rgba(125, 125, 125, 0.7);
  -webkit-border-radius: 6px;
}
::-webkit-scrollbar-thumb:horizontal{
  width: 5px;
  background-color: rgba(125, 125, 125, 0.7);
  -webkit-border-radius: 6px;
}
html, body{
  width: 100%;
  font-family: "Arial", "Microsoft YaHei", "黑体", "宋体", "微软雅黑", sans-serif;
}
body{
  line-height: 1;
  -webkit-text-size-adjust: none;
  -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
}
html{
  overflow-y: auto;
}
 
/*清除浮动*/
.clearfix:before,
.clearfix:after{
  content: " ";
  display: inline-block;
  height: 0;
  clear: both;
  visibility: hidden;
}
.clearfix{
  *zoom: 1;
}
    </style>
    <style>

body {
    height: 100%;
    background-color: #f5f5f5;
}
.body-content {
    /* display: flex; */
    /* flex-direction: column; */
    height: 100%;
    /* padding-top: 10px; */
}
.patient-info {
    margin-top: 10px;
    padding: 12px 14px;
    background-color: #ffffff;
}
.patient-info .name span {
    display: inline-block;
    width: 49%;
}
.patient-info p + p {
    margin-top: 10px;
}
.item-title {
    padding: 12px 14px;
    color: #5d5d5d;
}

.item-result {
    padding: 18px 14px;
    background-color: #ffffff;
}
.common-tip {
    font-size: 13px;
    padding: 12px 14px;
    color: #888888;
    line-height: 1.5em;
}
.clear-item {
    display: flex;
    flex-direction: row;
}
.left {
    /* float: left; */
    width: 34%;
    overflow-wrap: break-word;
    line-height: 1.3em;
}
.right {
    /* float: right; */
    flex: 1 1 auto;
    text-align: right;
}
.right span {
    display: inline-block;
    height: 100%;
    line-height: 40px;
}

.later {
    color: #888888;
}


.footer {
    width: 100%;
    position: fixed;
    font-size: 13px;
    bottom: 10px;
    text-align: center;
    color: #888888;
}
    </style>
</head>
<body>
    <div class="body-content">
        <div class="patient-info">
            <p class="name">
                <span>姓名：胡德平</span>
                <span>性别：男</span>
            </p>
            <p>
                <span>年龄：53岁</span>
            </p>
            <p>
                <span>申请科室：核酸筛查门诊</span>
            </p>
            <p>
                <span>报告医生：李江</span>
            </p>
            <p>
                <span>报告时间：2020-9-9 14:31:22</span>
            </p>
            <p>
                <span>检查报告号：1021020200909706</span>
            </p>
            <p>
                <span>临床诊断：要求新冠核酸筛查</span>
            </p>
        </div>
        <div class="item-title clear-item">
            <div class="left">检测指标</div>
            <div class="right">结果（参考值）</div>
        </div>
        <div class="item-result clear-item">
            <div class="left">
                新型冠状病毒核酸检测
            </div>
            <div class="right">
                <span class="former">阴性(Negative)</span>
                <span class="later">&nbsp;(阴性(Negative))</span>
            </div>
        </div>
        <div class="common-tip">
            部分微生物报告为图像报告，无法在微信端查看，请移步医院现场打印结果。
        </div>
    </div>
    <div class="footer">
        <p>Copyright &copy; 1993-2020 金蝶医疗软件科技有限公司</p>
    </div>
</body>
</html>
